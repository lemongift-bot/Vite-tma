<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velwix API Debugger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --card: #161920;
            --accent: #00f2ff;
            --text: #ffffff;
            --border: #262c3a;
            --green: #00ff88;
            --red: #ff3d71;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            padding: 15px; margin: 0; line-height: 1.4;
            overflow-x: hidden;
        }
        .header { font-family: 'Syne', sans-serif; font-size: 24px; color: var(--accent); margin-bottom: 20px; text-align: center; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
        }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }
        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 12px; color: var(--accent); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; margin-bottom: 10px; box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        
        .status-box {
            display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 10px;
            padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }

        .btn-main {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 16px; margin-bottom: 10px; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        
        #console {
            background: #000; border: 1px solid var(--border); border-radius: 8px;
            height: 250px; overflow-y: auto; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #aaa;
            white-space: pre-wrap; word-break: break-all;
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .log-time { color: #555; margin-right: 5px; }
        .log-err { color: var(--red); }
        .log-ok { color: var(--green); }
        .log-info { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">VELWIX TESTER</div>

<div class="card">
    <div class="status-box">
        <div id="dot" class="dot"></div>
        <span id="status-text">Telegram aniqlanmoqda...</span>
    </div>
    
    <label class="label">Worker URL (API Host)</label>
    <input type="text" id="api-url" value="https://api1.lemon-gift1.workers.dev" placeholder="https://api1.lemon-gift1.workers.dev">
</div>

<button class="btn-main" onclick="startRegister()">Register & Verify</button>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span class="label" style="margin:0">Konsol Loglari</span>
        <span onclick="clearLog()" style="font-size:10px; color:var(--red); cursor:pointer; font-weight: bold;">TOZALASH</span>
    </div>
    <div id="console">// Loglar bu yerda ko'rinadi...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const logContainer = document.getElementById('console');
    const statusText = document.getElementById('status-text');
    const dot = document.getElementById('dot');

    // Telegram UI sozlamalari
    tg.ready();
    tg.expand();

    // Telegram foydalanuvchisini tekshirish
    if (tg.initData) {
        dot.classList.add('active');
        const user = tg.initDataUnsafe.user;
        statusText.innerText = "Telegram: " + (user?.first_name || "User OK");
        statusText.style.color = "var(--green)";
    } else {
        statusText.innerText = "Brauzer rejimi (Ishlamasligi mumkin)";
        statusText.style.color = "var(--red)";
    }

    async function startRegister() {
        let baseUrl = document.getElementById('api-url').value.trim();
        // Oxiridagi sleshni olib tashlash
        if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
        
        const endpoint = "/auth/register";
        const url = baseUrl + endpoint;

        addLog('info', `So'rov boshlandi: POST ${url}`);

        if (!tg.initData) {
            addLog('err', "DIQQAT: tg.initData topilmadi! Bu verifikatsiya xatosiga sabab bo'ladi.");
        }

        try {
            // Register.ts'dagi 2-bosqichga mos ravishda yuborish
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Header orqali uzatish
                    'x-telegram-init-data': tg.initData || ""
                },
                // Body orqali ham uzatish (dublyaj uchun)
                body: JSON.stringify({ 
                    initData: tg.initData 
                })
            });

            const result = await response.json();

            if (response.ok) {
                addLog('ok', `SUCCESS [${response.status}]`);
                addLog('info', "Javob: " + JSON.stringify(result, null, 2));
                
                // Muvaffaqiyatli bo'lsa, foydalanuvchiga bildirish
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                addLog('err', `XATO [${response.status}]: ${result.error || 'Noma\'lum xato'}`);
                if (result.details) addLog('err', `Tafsilot: ${result.details}`);
                
                tg.HapticFeedback.notificationOccurred('error');
            }

        } catch (error) {
            addLog('err', "Fetch xatosi (Network Error): " + error.message);
            addLog('err', "Ehtimoliy sabablar: Worker URL noto'g'ri, CORS xatosi yoki internet yo'q.");
        }
    }

    function addLog(type, msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + 
                     now.getMinutes().toString().padStart(2, '0') + ":" + 
                     now.getSeconds().toString().padStart(2, '0');
        
        let colorClass = 'log-info';
        if (type === 'err') colorClass = 'log-err';
        if (type === 'ok') colorClass = 'log-ok';

        div.innerHTML = `<span class="log-time">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
        logContainer.prepend(div);
    }

    function clearLog() {
        logContainer.innerHTML = "// Konsol tozalandi...";
    }
</script>

</body>
</html>
