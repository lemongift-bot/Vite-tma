<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VelWix Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-color: var(--tg-theme-button-color, #248bed);
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #efeff4);
            color: var(--tg-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--tg-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 15px;
            border: 3px solid var(--tg-color);
        }

        h2 { margin: 10px 0; font-size: 20px; }
        p { color: var(--tg-hint); font-size: 14px; margin-bottom: 20px; }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-hint);
        }
    </style>
</head>
<body>

<div class="container">
    <img id="user-pic" class="profile-pic" src="https://via.placeholder.com/80" alt="Avatar">
    <h2 id="user-name">Yuklanmoqda...</h2>
    <p id="user-handle">@username</p>

    <div id="status" class="status-badge loading">Backendga ulanmoqda...</div>

    <div class="footer">VelWix.project📖 v1.0.0</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = 'https://api.lemon-gift.workers.dev';

    // Telegram interfeysini sozlash
    tg.expand();
    tg.ready();

    // UI elementlari
    const userPic = document.getElementById('user-pic');
    const userName = document.getElementById('user-name');
    const userHandle = document.getElementById('user-handle');
    const statusBadge = document.getElementById('status');

    async function initApp() {
        // 1. Foydalanuvchi ma'lumotlarini ekranga chiqarish
        const user = tg.initDataUnsafe?.user;

        if (user) {
            userName.innerText = `${user.first_name} ${user.last_name || ''}`;
            userHandle.innerText = user.username ? `@${user.username}` : `ID: ${user.id}`;
            if (user.photo_url) {
                userPic.src = user.photo_url;
            }
        } else {
            showStatus("Xato: Telegram ma'lumotlari topilmadi", "error");
            return;
        }

        // 2. Backendga ro'yxatdan o'tish so'rovini yuborish
        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    initData: tg.initData // Xavfsiz tekshiruv uchun asosiy qator
                })
            });

            const data = await response.json();

            if (data.success) {
                showStatus("Tizimga muvaffaqiyatli kirildi", "success");
            } else {
                showStatus("Xatolik: " + (data.error || "Noma'lum"), "error");
            }
        } catch (err) {
            showStatus("Server bilan aloqa uzildi", "error");
            console.error(err);
        }
    }

    function showStatus(text, type) {
        statusBadge.innerText = text;
        statusBadge.className = `status-badge ${type}`;
    }

    // Ilovani ishga tushirish
    initApp();
</script>

</body>
</html>
